<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Farm Daily Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--bdr:#dde3ed;--text:#1a2b3c;--muted:#7a8fa6;
  --A:#1565C0;--B:#2E7D32;--C:#E65100;
  --ok:#16a34a;--warn:#ca8a04;--bad:#dc2626;
  --ok-bg:#f0fdf4;--warn-bg:#fefce8;--bad-bg:#fff1f2;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* header */
.hdr{background:linear-gradient(135deg,#0d3b6e,#1565C0);color:#fff;
     padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
     box-shadow:0 2px 8px rgba(0,0,0,.2);gap:10px;flex-wrap:wrap}
.hdr-title{font-size:1.2rem;font-weight:700}
.hdr-sub{font-size:.73rem;opacity:.7;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.upd-btn{background:#fff;color:#0d3b6e;border:none;border-radius:8px;padding:7px 16px;
         font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s}
.upd-btn:hover{background:#dbeafe}.upd-btn:disabled{opacity:.5;cursor:not-allowed}
.last-upd{font-size:.73rem;opacity:.8;text-align:right;line-height:1.5}

/* ── COMPACT alert bar ── */
.alert-bar{display:flex;align-items:stretch;gap:0;margin:12px 24px;
           border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.alert-summary{padding:10px 16px;display:flex;align-items:center;gap:8px;
               font-weight:700;font-size:.88rem;white-space:nowrap;min-width:110px;
               border-right:1px solid rgba(255,255,255,.3)}
.alert-summary.all-ok{background:var(--ok);color:#fff}
.alert-summary.has-bad{background:var(--bad);color:#fff}
.alert-summary.has-warn{background:var(--warn);color:#fff}
.alert-chips{display:flex;align-items:center;gap:6px;padding:8px 14px;
             background:#fff;flex-wrap:wrap;flex:1}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
      font-size:.77rem;font-weight:600;white-space:nowrap;cursor:default}
.chip-bad{background:#fee2e2;color:var(--bad);border:1px solid #fca5a5}
.chip-warn{background:#fef9c3;color:#92400e;border:1px solid #fde047}

/* ── alert detail drawer (hidden by default, shown on chip click) ── */
.alert-drawer{display:none;margin:-12px 24px 12px;background:#fff;
              border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--r) var(--r);
              padding:10px 16px;font-size:.82rem;line-height:1.8}
.alert-drawer.open{display:block}
.drawer-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0;
            border-bottom:1px solid #f0f4f8}
.drawer-row:last-child{border-bottom:none}
.drawer-tank{font-weight:700;min-width:55px;flex-shrink:0}
.drawer-action{color:#374151}

/* tank cards */
.tanks-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;padding:0 24px 14px}
@media(max-width:860px){.tanks-row{grid-template-columns:1fr}}
.tank-card{background:var(--card);border-radius:var(--r);
           box-shadow:0 1px 5px rgba(0,0,0,.08);overflow:hidden}
.tank-card-A{border-top:4px solid var(--A)}
.tank-card-B{border-top:4px solid var(--B)}
.tank-card-C{border-top:4px solid var(--C)}
.tc-head{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between}
.tc-name{font-size:1.05rem;font-weight:800}
.tc-name-A{color:var(--A)}.tc-name-B{color:var(--B)}.tc-name-C{color:var(--C)}
.tc-badges{display:flex;gap:6px;align-items:center}
.doc-badge{background:#e8f0fe;color:#1565C0;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:12px}
.status-badge{font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:12px}
.sb-ok{background:#dcfce7;color:var(--ok)}.sb-warn{background:#fef9c3;color:#92400e}.sb-bad{background:#fee2e2;color:var(--bad)}
.param-tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.param-tbl th{background:#f8fafc;color:var(--muted);font-weight:600;padding:5px 8px;
              border-bottom:1px solid var(--bdr);text-align:center;font-size:.69rem}
.param-tbl td{padding:5px 8px;border-bottom:1px solid #f0f4f8;text-align:center;vertical-align:middle}
.param-tbl tr:last-child td{border-bottom:none}
.pname{text-align:left!important;font-weight:600;font-size:.79rem}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-ok{background:var(--ok)}.dot-warn{background:var(--warn)}.dot-bad{background:var(--bad)}
.val-ok{color:var(--ok);font-weight:700}.val-warn{color:var(--warn);font-weight:700}
.val-bad{color:var(--bad);font-weight:700}.val-na{color:#c5d0dc;font-size:.74rem}
.delta-up-bad{color:var(--bad);font-size:.7rem}.delta-dn-bad{color:var(--bad);font-size:.7rem}
.delta-good{color:var(--ok);font-size:.7rem}.delta-eq{color:var(--muted);font-size:.7rem}
.mw-row{padding:5px 14px 8px;font-size:.76rem;color:var(--muted);
        border-top:1px solid var(--bdr);display:flex;gap:12px;flex-wrap:wrap}
.mw-val{font-weight:700;color:var(--text);font-size:.86rem}

/* chart section */
.chart-section{background:var(--card);margin:0 24px 24px;border-radius:var(--r);
               box-shadow:0 1px 5px rgba(0,0,0,.08)}
.chart-controls{padding:11px 18px;border-bottom:1px solid var(--bdr);
                display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ctrl-grp{display:flex;align-items:center;gap:6px}
.ctrl-lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.pbtn,.dbtn{padding:4px 11px;border:1.5px solid var(--bdr);border-radius:6px;
  background:#fff;cursor:pointer;font-size:.79rem;font-weight:600;color:var(--muted);transition:all .15s}
.pbtn.active{background:var(--A);color:#fff;border-color:var(--A)}
.dbtn.active{background:#0d3b6e;color:#fff;border-color:#0d3b6e}
.pbtn:hover,.dbtn:hover{border-color:#1565C0;color:#1565C0}
.charts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--bdr)}
@media(max-width:860px){.charts-grid{grid-template-columns:1fr}}
.chart-col{border-right:1px solid var(--bdr)}
.chart-col:last-child{border-right:none}
.chart-col-hdr{padding:8px 14px 2px;display:flex;align-items:center;justify-content:space-between}
.cc-title{font-size:.88rem;font-weight:700}
.cc-A{color:var(--A)}.cc-B{color:var(--B)}.cc-C{color:var(--C)}
.cc-leg{font-size:.7rem;color:var(--muted);display:flex;gap:10px}

/* OneDrive error modal */
.od-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
          align-items:center;justify-content:center}
.od-modal.show{display:flex}
.od-box{background:#fff;border-radius:14px;padding:28px 32px;max-width:480px;width:90%;
        box-shadow:0 8px 32px rgba(0,0,0,.2)}
.od-box h3{font-size:1.05rem;font-weight:700;color:var(--bad);margin-bottom:12px}
.od-box p{font-size:.85rem;color:#374151;line-height:1.7;margin-bottom:10px}
.od-steps{background:#f8fafc;border-radius:8px;padding:12px 16px;margin:12px 0;
          font-size:.83rem;line-height:2}
.od-close{background:#1565C0;color:#fff;border:none;border-radius:8px;padding:8px 20px;
          font-size:.9rem;font-weight:700;cursor:pointer;float:right;margin-top:8px}

/* misc */
.toast{position:fixed;bottom:18px;right:18px;background:#1a2b3c;color:#fff;
       padding:10px 18px;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.78);
         z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.overlay.show{display:flex}
.spinner{width:38px;height:38px;border:4px solid #d1dbe8;border-top:4px solid #1565C0;
         border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- loading overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div style="color:#0d3b6e;font-weight:600;font-size:.92rem">OneDrive에서 데이터 로드 중...</div>
</div>



<!-- Header -->
<div class="hdr">

    <div class="hdr-title">&#127803; Farm Daily Dashboard</div>

  </div>
  <div class="hdr-right">

    <button class="upd-btn" id="updBtn" onclick="updateNow()">&#128260; Update Now</button>

</div>

<!-- Compact Alert Bar -->
<div id="alertBar" class="alert-bar"></div>
<div id="alertDrawer" class="alert-drawer"></div>

    <table class="param-tbl">

        <th style="text-align:left">파라미터</th>
        <th>AM</th><th>PM</th><th>&#9651;&#9661;</th>
      </tr></thead>
      <tbody id="tc-body-A"></tbody>

    <div class="mw-row" id="tc-mw-A"></div>
  </div>
  <div class="tank-card tank-card-B">
    <div class="tc-head">
      <span class="tc-name tc-name-B">&#127803; Tank B</span>

        <span id="tc-status-B" class="status-badge sb-ok">—</span>
      </div>
    </div>
    <table class="param-tbl">
      <thead><tr>
        <th style="text-align:left">파라미터</th>
        <th>AM</th><th>PM</th><th>&#9651;&#9661;</th>
      </tr></thead>
      <tbody id="tc-body-B"></tbody>
    </table>
    <div class="mw-row" id="tc-mw-B"></div>
  </div>
  <div class="tank-card tank-card-C">
    <div class="tc-head">
      <span class="tc-name tc-name-C">&#127803; Tank C</span>
      <div class="tc-badges">
        <span class="doc-badge" id="tc-doc-C">DOC —</span>
        <span id="tc-status-C" class="status-badge sb-ok">—</span>
      </div>
    </div>
    <table class="param-tbl">
      <thead><tr>
        <th style="text-align:left">파라미터</th>
        <th>AM</th><th>PM</th><th>&#9651;&#9661;</th>
      </tr></thead>
      <tbody id="tc-body-C"></tbody>
    </table>
    <div class="mw-row" id="tc-mw-C"></div>
  </div>
</div>

<!-- Charts -->
<div class="chart-section">
  <div class="chart-controls">
    <div class="ctrl-grp">
      <span class="ctrl-lbl">파라미터</span>
      <button class="pbtn" data-p="Temp" onclick="selectParam('Temp')">Temp</button>
      <button class="pbtn active" data-p="DO" onclick="selectParam('DO')">DO</button>
      <button class="pbtn" data-p="pH" onclick="selectParam('pH')">pH</button>
      <button class="pbtn" data-p="TAN" onclick="selectParam('TAN')">TAN</button>
      <button class="pbtn" data-p="NO2" onclick="selectParam('NO2')">NO&#8322;</button>
      <button class="pbtn" data-p="NO3" onclick="selectParam('NO3')">NO&#8323;</button>
      <button class="pbtn" data-p="MW" onclick="selectParam('MW')">MW</button>
    </div>
    <div style="width:1px;height:22px;background:var(--bdr)"></div>
    <div class="ctrl-grp">
      <span class="ctrl-lbl">기간</span>
      <button class="dbtn" data-d="3" onclick="selectDays(3)">3일</button>
      <button class="dbtn active" data-d="7" onclick="selectDays(7)">7일</button>
      <button class="dbtn" data-d="14" onclick="selectDays(14)">14일</button>
      <button class="dbtn" data-d="30" onclick="selectDays(30)">30일</button>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-col">
      <div class="chart-col-hdr">
        <span class="cc-title cc-A">Tank A</span>
        <div class="cc-leg">

  </div>
</div>

function getStatus(p,v){
  if(v===null||v===undefined) return 'na';
  const t=THR[p]; if(!t) return 'ok';
  const [ok1,ok2]=t.ok,[w1,w2]=t.warn;
  if(t.dir==='range') return (v>=ok1&&v<=ok2)?'ok':(v>=w1&&v<=w2)?'warn':'bad';
  if(t.dir==='min')   return v>=ok1?'ok':v>=w1?'warn':'bad';
  return v<=ok2?'ok':v<=w2?'warn':'bad';
}
function worst(arr){return arr.includes('bad')?'bad':arr.includes('warn')?'warn':'ok';}
function valCls(s){return{ok:'val-ok',warn:'val-warn',bad:'val-bad',na:'val-na'}[s]||'val-na';}
function dotCls(s){return{ok:'dot-ok',warn:'dot-warn',bad:'dot-bad'}[s]||'';}

/* ── compact alert bar ─────────────────────────────────── */
function buildAlerts(){
  const out=[];
  for(const t of TANKS){
    const days=TANK_DATA[t]||[]; if(!days.length) continue;
    const td=days[days.length-1];
    for(const p of ['DO','TAN','pH','Temp','NO2','NO3']){
      let ws='ok',wv=null;
      for(const entry of [td.AM||{},td.PM||{}]){
        const v=entry[p]; if(v===null||v===undefined) continue;
        const s=getStatus(p,v);
        if(s==='bad'){ws='bad';wv=v;break;}
        if(s==='warn'&&ws!=='bad'){ws='warn';wv=v;}
      }
      if(ws==='ok') continue;
      out.push({level:ws,tank:t,param:p,val:wv,action:(ACTIONS[p]||{})[ws]||''});
    }
  }
  out.sort((a,b)=>(a.level==='bad'?0:1)-(b.level==='bad'?0:1));
  return out;
}

function renderAlertBar(){
  const alerts=buildAlerts();
  const bar=document.getElementById('alertBar');
  const drawer=document.getElementById('alertDrawer');

  if(!alerts.length){
    bar.innerHTML='<div class="alert-summary all-ok">&#9989; 전 수조 정상</div>'
      +'<div class="alert-chips" style="color:#16a34a;font-size:.83rem;font-weight:600">이상 없음 — 정상 운영 중</div>';
    drawer.classList.remove('open');
    return;
  }
  const badCount =alerts.filter(a=>a.level==='bad').length;
  const warnCount=alerts.filter(a=>a.level==='warn').length;
  const sumCls = badCount>0?'has-bad':'has-warn';
  const sumTxt = (badCount>0?`&#128308; 위험 ${badCount}건 `:'')+(warnCount>0?`&#128993; 주의 ${warnCount}건`:'');

  const chips=alerts.map(a=>{
    const dec={Temp:1,DO:2,pH:2,TAN:2,NO2:2,NO3:1}[a.param]||2;
    const vStr=(a.val!==null)?a.val.toFixed(dec):'?';
    return `<span class="chip chip-${a.level}" title="${a.action}">`
      +`Tank ${a.tank} ${PLABELS[a.param]} ${vStr}</span>`;
  }).join('');

  bar.innerHTML=`<div class="alert-summary ${sumCls}" onclick="toggleDrawer()" style="cursor:pointer">${sumTxt} &#9660;</div>`
    +`<div class="alert-chips">${chips}</div>`;

  // drawer with action details
  const rows=alerts.map(a=>{
    const dec={Temp:1,DO:2,pH:2,TAN:2,NO2:2,NO3:1}[a.param]||2;
    const icon=a.level==='bad'?'&#128308;':'&#128993;';
    return `<div class="drawer-row">`
      +`<span class="drawer-tank">${icon} Tank ${a.tank}</span>`
      +`<span class="drawer-action">${PLABELS[a.param]}: <strong>${a.val!==null?a.val.toFixed(dec):'?'} ${UNITS[a.param]}</strong> &rarr; ${a.action}</span>`
      +`</div>`;
  }).join('');
  drawer.innerHTML=rows;
}
function toggleDrawer(){
  drawerOpen=!drawerOpen;

}

  if(v===null||v===undefined) return '<span class="val-na">—</span>';

}
function deltaHtml(cur,prev,p){
  if(cur==null||prev==null) return '<span class="delta-eq">—</span>';

}

    const stLbl={ok:'정상',warn:'주의',bad:'위험'};
    const el=document.getElementById('tc-status-'+t);
    el.className='status-badge '+(sbMap[ts]||'sb-ok');
    el.textContent=stLbl[ts]||'—';
    document.getElementById('tc-doc-'+t).textContent='DOC '+(td.DOC||'—')+'일';

    let lastMW=null,mwDate='',mwDOC=null;
    for(let i=days.length-1;i>=0;i--){
      const mw=days[i].AM&&days[i].AM.MW;
      if(mw){lastMW=mw;mwDate=days[i].date;mwDOC=days[i].DOC;break;}
    }
    const mwEl=document.getElementById('tc-mw-'+t);
    mwEl.innerHTML=lastMW
      ?`<span class="mw-val">MW ${lastMW.toFixed(2)} g</span><span>(DOC${mwDOC} / ${mwDate})</span>`
      :'<span>MW 기록 없음</span>';

    document.getElementById('tc-body-'+t).innerHTML=
      ['Temp','DO','pH','TAN','NO2','NO3'].map(function(p){
        const ws=worst([getStatus(p,AM[p]),getStatus(p,PM[p])].filter(s=>s!=='na'));
        return `<tr><td class="pname"><span class="dot ${dotCls(ws)}"></span>${PLABELS[p]}</td>`
          +`<td>${fmtV(AM[p],p)}</td><td>${fmtV(PM[p],p)}</td><td>${deltaHtml(AM[p],yAM[p],p)}</td></tr>`;
      }).join('');
  }
}

/* ── charts (3 separate) ─────────────────────────────────── */
function getRangeDays(days,n){
  if(!days.length) return days;
  const last=new Date(days[days.length-1].date+'T00:00:00');
  const cut=new Date(last); cut.setDate(cut.getDate()-n+1);
  return days.filter(d=>new Date(d.date+'T00:00:00')>=cut);
}
function makeShapes(p){
  const t=THR[p]; if(!t) return{shapes:[],anns:[]};
  const shapes=[],anns=[];
  const add=(y,c,lbl)=>{
    shapes.push({type:'line',xref:'paper',yref:'y',x0:0,x1:1,y0:y,y1:y,line:{color:c,width:1.1,dash:'dashdot'}});
    anns.push({xref:'paper',yref:'y',x:1.01,y,text:lbl,showarrow:false,font:{size:8.5,color:c},xanchor:'left'});
  };
  if(t.dir==='min'||t.dir==='range') add(t.ok[0],'#16a34a','OK≥'+t.ok[0]);
  if(t.dir==='max'||t.dir==='range') add(t.ok[1],'#16a34a','OK≤'+t.ok[1]);
  if(t.dir==='max'||t.dir==='range') add(t.warn[1],'#dc2626','>'+t.warn[1]);
  if(t.dir==='min') add(t.warn[0],'#dc2626','<'+t.warn[0]);
  return{shapes,anns};
}
function renderCharts(){
  const {shapes,anns}=makeShapes(curParam);
  for(const t of TANKS){
    const days=getRangeDays(TANK_DATA[t]||[],curDays);
    const dates=days.map(d=>d.date);
    const amY=days.map(d=>(d.AM&&d.AM[curParam]!=null)?d.AM[curParam]:null);
    const pmY=days.map(d=>(d.PM&&d.PM[curParam]!=null)?d.PM[curParam]:null);
    const col=COLORS[t];
    const allV=[...amY,...pmY].filter(v=>v!=null);
    const mn=allV.length?Math.min(...allV):0, mx=allV.length?Math.max(...allV):1;
    const pad=(mx-mn)*.15||.3;
    Plotly.react('chart-'+t,[
      {x:dates,y:amY,name:'AM',mode:'lines+markers',line:{color:col,width:2.2},
       marker:{size:5,color:col},hovertemplate:'%{x} AM: %{y}<extra></extra>',connectgaps:true},
      {x:dates,y:pmY,name:'PM',mode:'lines+markers',line:{color:col,width:1.8,dash:'dot'},
       marker:{size:4,color:col,symbol:'diamond'},hovertemplate:'%{x} PM: %{y}<extra></extra>',
       connectgaps:true,opacity:.8},
    ],{
      margin:{t:4,b:44,l:44,r:76},
      xaxis:{tickformat:'%m/%d',tickfont:{size:10},showgrid:true,gridcolor:'#e8edf2',zeroline:false},
      yaxis:{title:UNITS[curParam],titlefont:{size:10},tickfont:{size:10},
             showgrid:true,gridcolor:'#e8edf2',zeroline:false,range:[mn-pad,mx+pad]},
      legend:{orientation:'h',y:-.22,x:.5,xanchor:'center',font:{size:10}},
      plot_bgcolor:'#f8fbff',paper_bgcolor:'#fff',shapes,annotations:anns,showlegend:true,
    },{responsive:true,displayModeBar:false});
  }
}
function selectParam(p){
  curParam=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  renderCharts();
}
function selectDays(d){
  curDays=d;
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.d)===d));
  renderCharts();
}

/* ── Google Sheets 연동 ─────────────────────── */
function csvRow(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(c.replace(/^"|"$/g,''));c='';}
    else{c+=line[i];}
  }
  r.push(c.replace(/^"|"$/g,''));return r;
}
async function fetchSheet(sheetName){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(sheetName);
  const resp=await fetch(url);
  if(!resp.ok) throw new Error('HTTP '+resp.status+' ('+sheetName+')');
  const text=await resp.text();
  const lines=text.split('\n').filter(l=>l.trim());
  const headers=csvRow(lines[0]).map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=csvRow(l);
    const row={};
    headers.forEach((h,i)=>{row[h]=vals[i]!==undefined?vals[i].trim():'';});
    return row;
  });
}
function buildTankData(rows){
  const byDate={};
  rows.forEach(function(r){
    const raw=r['Date']||'';
    const dt=raw.length>=10?raw.substring(0,10):null;
    if(!dt) return;
    if(!byDate[dt]) byDate[dt]={date:dt,DOC:parseInt(r['DOC'])||null,AM:{},PM:{}};
    const time=(r['Time']||'').trim().toUpperCase();
    const entry={};
    [['Temp (°C)','Temp'],['DO (mg/L)','DO'],['pH','pH'],
     ['TAN (mg/L)','TAN'],['NO2 (mg/L)','NO2'],['NO3 (mg/L)','NO3'],['MW (g)','MW']
    ].forEach(function([col,k]){
      const v=r[col];entry[k]=(v!=null&&v!=='')?parseFloat(v):null;
    });
    if(time==='AM') byDate[dt].AM=entry;
    else if(time==='PM') byDate[dt].PM=entry;
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}
async function updateNow(){
  if(SHEET_ID==='YOUR_SHEET_ID_HERE'){
    showToast('⚠️ SHEET_ID를 설정해주세요 (가이드 참조)',true);return;
  }
  const btn=document.getElementById('updBtn');
  const ov=document.getElementById('overlay');
  btn.disabled=true;btn.textContent='⏳ 불러오는 중...';ov.classList.add('show');
  try{
    for(const t of TANKS){
      const rows=await fetchSheet('Tank_'+t);
      TANK_DATA[t]=buildTankData(rows);
    }
    document.getElementById('lastUpd').textContent=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
    renderAll();
    showToast('✅ Google Sheets 최신 데이터 반영 완료');
  }catch(e){
    console.error(e);
    showToast('⚠️ 오류: '+e.message,true);
  }finally{
    ov.classList.remove('show');btn.disabled=false;btn.textContent='🔄 Update Now';
  }
}

/* ── 파일 직접 로드 ─────────────────────── */
function parseExcelBuffer(buf){
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    for(const t of TANKS){
      const sn='Tank_'+t;
      if(!wb.SheetNames.includes(sn)){TANK_DATA[t]=[];continue;}
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{raw:false,dateNF:'yyyy-mm-dd'});
      const byDate={};
      rows.forEach(function(r){
        const dt=r['Date']?String(r['Date']).substring(0,10):null; if(!dt) return;
        if(!byDate[dt]) byDate[dt]={date:dt,DOC:parseInt(r['DOC'])||null,AM:{},PM:{}};
        const time=String(r['Time']||'').trim().toUpperCase();
        const entry={};
        ['Temp (°C)','DO (mg/L)','pH','TAN (mg/L)','NO2 (mg/L)','NO3 (mg/L)','MW (g)'].forEach(function(col){
          const k=col.replace(' (°C)','').replace(' (mg/L)','').replace(' (g)','');
          const v=r[col]; entry[k]=(v!=null&&v!=='')?parseFloat(v):null;
        });
        if(time==='AM') byDate[dt].AM=entry; else if(time==='PM') byDate[dt].PM=entry;
      });
      TANK_DATA[t]=Object.values(byDate).sort(function(a,b){return a.date.localeCompare(b.date);});
    }
    document.getElementById('lastUpd').textContent=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
    renderAll();
    showToast('✅ 파일 데이터 반영 완료');
}


function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.background=err?'#b91c1c':'#1a2b3c';
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},4000);
}

function renderAll(){ renderAlertBar(); renderCards(); renderCharts(); }
renderAll();
